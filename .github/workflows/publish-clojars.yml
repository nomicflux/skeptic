# Reusable: verify aligned versions, install locally, deploy to Clojars (library then plugin).
# workflow_call: caller must pass commit_sha (exact tree after bump).
# workflow_dispatch: default checkout for standalone publish.

name: Publish to Clojars

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Full commit SHA to checkout (from change-project-versions output)."
        required: true
        type: string
    secrets:
      CLOJARS_USERNAME:
        required: false
      CLOJARS_SKEPTIC_TOKEN:
        required: false
      CLOJARS_LEIN_SKEPTIC_TOKEN:
        required: false
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
      CLOJARS_SKEPTIC_TOKEN: ${{ secrets.CLOJARS_SKEPTIC_TOKEN }}
      CLOJARS_LEIN_SKEPTIC_TOKEN: ${{ secrets.CLOJARS_LEIN_SKEPTIC_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          lein: 2.11.2

      - name: Verify monorepo versions
        run: bash script/verify-monorepo-versions.sh

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-publish-${{ hashFiles('skeptic/project.clj', 'lein-skeptic/project.clj') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Require Clojars secrets
        run: |
          set -euo pipefail
          if [[ -z "${CLOJARS_USERNAME}" || -z "${CLOJARS_SKEPTIC_TOKEN}" || -z "${CLOJARS_LEIN_SKEPTIC_TOKEN}" ]]; then
            echo "Set repository Actions secrets: CLOJARS_USERNAME, CLOJARS_SKEPTIC_TOKEN, CLOJARS_LEIN_SKEPTIC_TOKEN."
            echo "Reusable calls need secrets: inherit on the caller job (see release-lifecycle)."
            exit 1
          fi

      - name: Require GPG secrets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [[ -z "${GPG_PRIVATE_KEY}" || -z "${GPG_PASSPHRASE}" ]]; then
            echo "Set repository Actions secrets: GPG_PRIVATE_KEY (ASCII-armored private key), GPG_PASSPHRASE."
            echo "lein deploy signs releases by default; signing fails without a key in the agent."
            exit 1
          fi

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5

      - name: Build and deploy skeptic to Clojars
        run: lein do clean, deploy
        working-directory: skeptic

      - name: Capture published skeptic jar sha1
        id: skeptic_sha
        run: |
          set -euo pipefail
          jar=$(ls target/skeptic-*.jar | grep -v -- '-sources\.jar$' | head -1)
          sha=$(shasum -a 1 "$jar" | awk '{print $1}')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Published $jar sha1=$sha"
        working-directory: skeptic

      - name: Purge local skeptic from ~/.m2 to force Clojars resolution
        run: rm -rf ~/.m2/repository/org/clojars/nomicflux/skeptic

      - name: Resolve skeptic for lein-skeptic from Clojars
        run: lein -U deps
        working-directory: lein-skeptic

      - name: Verify resolved skeptic matches just-published artifact
        run: |
          set -euo pipefail
          resolved=$(ls ~/.m2/repository/org/clojars/nomicflux/skeptic/*/skeptic-*.jar | grep -v -- '-sources\.jar$' | head -1)
          sha=$(shasum -a 1 "$resolved" | awk '{print $1}')
          expected="${{ steps.skeptic_sha.outputs.sha }}"
          if [[ "$sha" != "$expected" ]]; then
            echo "Resolved $resolved sha1=$sha does not match just-published sha1=$expected"
            exit 1
          fi
          echo "Verified $resolved matches just-published skeptic (sha1=$sha)"

      - name: Install lein-skeptic plugin
        run: lein do clean, install
        working-directory: lein-skeptic

      - name: Deploy lein-skeptic to Clojars
        run: lein deploy
        working-directory: lein-skeptic
