# Reusable: verify aligned versions, install locally, deploy to Clojars (library then plugin).
# workflow_call: caller must pass commit_sha (exact tree after bump).
# workflow_dispatch: default checkout for standalone publish.

name: Publish to Clojars

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Full commit SHA to checkout (from change-project-versions output)."
        required: true
        type: string
    secrets:
      CLOJARS_USERNAME:
        required: false
      CLOJARS_SKEPTIC_TOKEN:
        required: false
      CLOJARS_LEIN_SKEPTIC_TOKEN:
        required: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout at release commit
        if: github.event_name == 'workflow_call'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit_sha }}

      - name: Checkout default
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 2.11.2

      - name: Verify monorepo versions
        run: bash script/verify-monorepo-versions.sh

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-publish-${{ hashFiles('skeptic/project.clj', 'lein-skeptic/project.clj') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Install skeptic library
        run: lein install
        working-directory: skeptic

      - name: Install lein-skeptic plugin
        run: lein install
        working-directory: lein-skeptic

      - name: Configure Leiningen Clojars credentials (skeptic)
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_SKEPTIC_TOKEN: ${{ secrets.CLOJARS_SKEPTIC_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p ~/.lein
          if [[ -z "${CLOJARS_USERNAME}" || -z "${CLOJARS_SKEPTIC_TOKEN}" ]]; then
            echo "Deploy needs CLOJARS_USERNAME and CLOJARS_SKEPTIC_TOKEN."
            exit 1
          fi
          printf '%s\n' "{#\"https://repo.clojars.org\" {:username \"${CLOJARS_USERNAME}\" :password \"${CLOJARS_SKEPTIC_TOKEN}\"}}" > ~/.lein/credentials.clj

      - name: Deploy skeptic to Clojars
        run: lein deploy clojars
        working-directory: skeptic

      - name: Configure Leiningen Clojars credentials (lein-skeptic)
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_LEIN_SKEPTIC_TOKEN: ${{ secrets.CLOJARS_LEIN_SKEPTIC_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOJARS_USERNAME}" || -z "${CLOJARS_LEIN_SKEPTIC_TOKEN}" ]]; then
            echo "Deploy needs CLOJARS_USERNAME and CLOJARS_LEIN_SKEPTIC_TOKEN."
            exit 1
          fi
          printf '%s\n' "{#\"https://repo.clojars.org\" {:username \"${CLOJARS_USERNAME}\" :password \"${CLOJARS_LEIN_SKEPTIC_TOKEN}\"}}" > ~/.lein/credentials.clj

      - name: Deploy lein-skeptic to Clojars
        run: lein deploy clojars
        working-directory: lein-skeptic
