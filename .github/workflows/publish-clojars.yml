# Reusable: verify aligned versions, install locally, deploy to Clojars (library then plugin).
# workflow_call: caller must pass commit_sha (exact tree after bump).
# workflow_dispatch: default checkout for standalone publish.

name: Publish to Clojars

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Full commit SHA to checkout (from change-project-versions output)."
        required: true
        type: string
    secrets:
      CLOJARS_USERNAME:
        required: false
      CLOJARS_SKEPTIC_TOKEN:
        required: false
      CLOJARS_LEIN_SKEPTIC_TOKEN:
        required: false
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
      CLOJARS_SKEPTIC_TOKEN: ${{ secrets.CLOJARS_SKEPTIC_TOKEN }}
      CLOJARS_LEIN_SKEPTIC_TOKEN: ${{ secrets.CLOJARS_LEIN_SKEPTIC_TOKEN }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          lein: 2.11.2

      - name: Verify monorepo versions
        run: bash script/verify-monorepo-versions.sh

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-publish-${{ hashFiles('skeptic/project.clj', 'lein-skeptic/project.clj') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Require Clojars secrets
        run: |
          set -euo pipefail
          if [[ -z "${CLOJARS_USERNAME}" || -z "${CLOJARS_SKEPTIC_TOKEN}" || -z "${CLOJARS_LEIN_SKEPTIC_TOKEN}" ]]; then
            echo "Set repository Actions secrets: CLOJARS_USERNAME, CLOJARS_SKEPTIC_TOKEN, CLOJARS_LEIN_SKEPTIC_TOKEN."
            echo "Reusable calls need secrets: inherit on the caller job (see release-lifecycle)."
            exit 1
          fi

      - name: Require GPG secrets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [[ -z "${GPG_PRIVATE_KEY}" || -z "${GPG_PASSPHRASE}" ]]; then
            echo "Set repository Actions secrets: GPG_PRIVATE_KEY (ASCII-armored private key), GPG_PASSPHRASE."
            echo "lein deploy signs releases by default; signing fails without a key in the agent."
            exit 1
          fi

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5

      # Idempotent publish. Re-running the workflow (e.g. after a transient
      # failure) must not 403 on an already-published release. Clojars rejects
      # redeploying a non-SNAPSHOT version, so for non-SNAPSHOT we skip deploy
      # when the coordinate already exists. SNAPSHOT versions always deploy
      # (Clojars permits SNAPSHOT overwrites).
      - name: Determine skeptic publish state
        id: skeptic_state
        run: |
          set -euo pipefail
          version=$(sed -n 's/^(defproject org\.clojars\.nomicflux\/skeptic "\([^"]*\)".*/\1/p' skeptic/project.clj)
          [[ -n "$version" ]] || { echo "could not parse skeptic version"; exit 1; }
          url="https://repo.clojars.org/org/clojars/nomicflux/skeptic/${version}/skeptic-${version}.pom"
          if [[ "$version" == *-SNAPSHOT ]]; then
            deploy=true
          elif curl -sfI "$url" > /dev/null 2>&1; then
            deploy=false
          else
            deploy=true
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"
          echo "skeptic $version on Clojars: deploy=$deploy"

      - name: Build and deploy skeptic to Clojars
        if: steps.skeptic_state.outputs.deploy == 'true'
        run: lein do clean, deploy
        working-directory: skeptic

      - name: Skip skeptic deploy (already on Clojars)
        if: steps.skeptic_state.outputs.deploy != 'true'
        run: echo "skeptic ${{ steps.skeptic_state.outputs.version }} already on Clojars; skipping deploy."

      # lein-skeptic does not depend on skeptic via :dependencies (it is empty
      # by design); the launcher resolves [org.clojars.nomicflux/skeptic <ver>]
      # at task time. So `lein deps` in lein-skeptic resolves nothing skeptic-
      # related. Resolve that exact coordinate directly to confirm the skeptic
      # release is fetchable from Clojars before publishing the plugin.
      - name: Resolve skeptic from Clojars for lein-skeptic
        env:
          VERSION: ${{ steps.skeptic_state.outputs.version }}
        run: |
          set -euo pipefail
          glob=~/.m2/repository/org/clojars/nomicflux/skeptic/"$VERSION"/skeptic-"$VERSION".jar
          for attempt in 1 2 3 4 5 6; do
            rm -rf ~/.m2/repository/org/clojars/nomicflux/skeptic
            if lein -U update-in :dependencies conj "[org.clojars.nomicflux/skeptic \"$VERSION\"]" -- deps; then
              if compgen -G "$glob" > /dev/null; then
                break
              fi
            fi
            echo "skeptic $VERSION not resolvable from Clojars yet (attempt $attempt); waiting for index..."
            sleep 15
          done
          if ! compgen -G "$glob" > /dev/null; then
            echo "skeptic $VERSION did not become resolvable from Clojars"
            exit 1
          fi
          echo "Resolved skeptic $VERSION from Clojars."
        working-directory: lein-skeptic

      - name: Determine lein-skeptic publish state
        id: lein_state
        run: |
          set -euo pipefail
          version=$(sed -n 's/^(defproject org\.clojars\.nomicflux\/lein-skeptic "\([^"]*\)".*/\1/p' lein-skeptic/project.clj)
          [[ -n "$version" ]] || { echo "could not parse lein-skeptic version"; exit 1; }
          url="https://repo.clojars.org/org/clojars/nomicflux/lein-skeptic/${version}/lein-skeptic-${version}.pom"
          if [[ "$version" == *-SNAPSHOT ]]; then
            deploy=true
          elif curl -sfI "$url" > /dev/null 2>&1; then
            deploy=false
          else
            deploy=true
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"
          echo "lein-skeptic $version on Clojars: deploy=$deploy"

      - name: Install lein-skeptic plugin
        run: lein do clean, install
        working-directory: lein-skeptic

      - name: Deploy lein-skeptic to Clojars
        if: steps.lein_state.outputs.deploy == 'true'
        run: lein deploy
        working-directory: lein-skeptic

      - name: Skip lein-skeptic deploy (already on Clojars)
        if: steps.lein_state.outputs.deploy != 'true'
        run: echo "lein-skeptic ${{ steps.lein_state.outputs.version }} already on Clojars; skipping deploy."
