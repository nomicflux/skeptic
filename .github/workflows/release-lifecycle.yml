# Coordinated stable release: composes change-project-versions + publish-clojars only.
# Invariant: ongoing dev uses *-SNAPSHOT; a non-SNAPSHOT version is an exact release coordinate only.
# Example: tree at 0.7.0-SNAPSHOT → publish 0.7.0 → return dev to 0.8.0-SNAPSHOT (inputs: bare 0.7.0, bare 0.8.0).
# validate → bump SNAPSHOT→release → publish → bump release→next SNAPSHOT.
# Single workflow_dispatch; explicit checkout_ref / commit_sha (see docs/releasing.md).

name: Release lifecycle

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Stable release to cut — bare only (e.g. 0.7.0). Repo must already be <this>-SNAPSHOT everywhere coordinated files apply."
        required: true
        type: string
      next_dev_version:
        description: "Next dev line after publish — bare only (e.g. 0.8.0). Workflow sets coordinated version to <this>-SNAPSHOT. Do not type -SNAPSHOT."
        required: true
        type: string

# Caller must allow contents:write for reusable change-project-versions (git push).
# Nested workflows cannot elevate GITHUB_TOKEN above the caller (GitHub docs: reusable-workflows-reference).
permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      from_snapshot: ${{ steps.set.outputs.from_snapshot }}
      release_version: ${{ steps.set.outputs.release_version }}
      next_snapshot: ${{ steps.set.outputs.next_snapshot }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate and set outputs
        id: set
        env:
          REL: ${{ inputs.release_version }}
          NEXT: ${{ inputs.next_dev_version }}
        run: |
          set -euo pipefail
          if [[ -z "$REL" || -z "$NEXT" || "$REL" == "$NEXT" ]]; then
            echo "release_version and next_dev_version must be non-empty and different bare versions."
            exit 1
          fi
          if [[ "$REL" == *"-SNAPSHOT"* ]]; then
            echo "release_version must be bare stable only (e.g. 0.7.0), not 0.7.0-SNAPSHOT."
            exit 1
          fi
          if [[ "$NEXT" == *"-SNAPSHOT"* ]]; then
            echo "next_dev_version must be bare only (e.g. 0.8.0). Do not append -SNAPSHOT."
            exit 1
          fi
          FROM_SNAP="${REL}-SNAPSHOT"
          NEXT_SNAP="${NEXT}-SNAPSHOT"
          {
            echo "from_snapshot=${FROM_SNAP}"
            echo "release_version=${REL}"
            echo "next_snapshot=${NEXT_SNAP}"
          } >> "$GITHUB_OUTPUT"

  bump_to_release:
    needs: validate
    uses: ./.github/workflows/change-project-versions.yml
    with:
      from_version: ${{ needs.validate.outputs.from_snapshot }}
      to_version: ${{ needs.validate.outputs.release_version }}
      checkout_ref: ${{ github.sha }}

  publish:
    needs: bump_to_release
    uses: ./.github/workflows/publish-clojars.yml
    with:
      commit_sha: ${{ needs.bump_to_release.outputs.commit_sha }}
    secrets: inherit

  bump_to_next_snapshot:
    needs:
      - validate
      - publish
      - bump_to_release
    uses: ./.github/workflows/change-project-versions.yml
    with:
      from_version: ${{ needs.validate.outputs.release_version }}
      to_version: ${{ needs.validate.outputs.next_snapshot }}
      checkout_ref: ${{ needs.bump_to_release.outputs.commit_sha }}
