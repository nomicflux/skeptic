# Coordinated stable release: composes change-project-versions + publish-clojars only.
# validate → bump SNAPSHOT→release → publish → bump release→next SNAPSHOT.
# Single workflow_dispatch; explicit checkout_ref / commit_sha (see docs/releasing.md).

name: Release lifecycle

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Stable version to publish (repo must currently be \"<this>-SNAPSHOT\" everywhere, e.g. 0.7.0)"
        required: true
        type: string
      next_snapshot_version:
        description: "Next development line (e.g. 0.8.0-SNAPSHOT)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      from_snapshot: ${{ steps.set.outputs.from_snapshot }}
      release_version: ${{ steps.set.outputs.release_version }}
      next_snapshot: ${{ steps.set.outputs.next_snapshot }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and set outputs
        id: set
        env:
          REL: ${{ inputs.release_version }}
          NEXT: ${{ inputs.next_snapshot_version }}
        run: |
          set -euo pipefail
          if [[ -z "$REL" || -z "$NEXT" || "$REL" == "$NEXT" ]]; then
            echo "release_version and next_snapshot_version must be non-empty and different."
            exit 1
          fi
          if [[ "$REL" == *"-SNAPSHOT"* ]]; then
            echo "release_version must not include -SNAPSHOT (e.g. use 0.7.0 not 0.7.0-SNAPSHOT)."
            exit 1
          fi
          if [[ "$NEXT" != *"-SNAPSHOT"* ]]; then
            echo "next_snapshot_version must include -SNAPSHOT (e.g. 0.8.0-SNAPSHOT)."
            exit 1
          fi
          FROM_SNAP="${REL}-SNAPSHOT"
          for f in skeptic/project.clj lein-skeptic/project.clj README.md; do
            if ! grep -qF "$FROM_SNAP" "$f"; then
              echo "Expected coordinated snapshot version '$FROM_SNAP' in $f"
              exit 1
            fi
          done
          {
            echo "from_snapshot=${FROM_SNAP}"
            echo "release_version=${REL}"
            echo "next_snapshot=${NEXT}"
          } >> "$GITHUB_OUTPUT"

  bump_to_release:
    needs: validate
    uses: ./.github/workflows/change-project-versions.yml
    with:
      from_version: ${{ needs.validate.outputs.from_snapshot }}
      to_version: ${{ needs.validate.outputs.release_version }}
      checkout_ref: ${{ github.sha }}

  publish:
    needs: bump_to_release
    uses: ./.github/workflows/publish-clojars.yml
    with:
      commit_sha: ${{ needs.bump_to_release.outputs.commit_sha }}
    secrets: inherit

  bump_to_next_snapshot:
    needs:
      - validate
      - publish
      - bump_to_release
    uses: ./.github/workflows/change-project-versions.yml
    with:
      from_version: ${{ needs.validate.outputs.release_version }}
      to_version: ${{ needs.validate.outputs.next_snapshot }}
      checkout_ref: ${{ needs.bump_to_release.outputs.commit_sha }}
