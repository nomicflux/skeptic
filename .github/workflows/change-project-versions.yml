# Reusable: coordinated version bump (replace, verify, pom, commit, tag v<to>, push).
# workflow_call: always pass checkout_ref (lifecycle: github.sha then bump commit_sha).
# workflow_dispatch: from/to only; default checkout.

name: Change project versions

on:
  workflow_call:
    inputs:
      from_version:
        required: true
        type: string
      to_version:
        required: true
        type: string
      checkout_ref:
        description: "Git ref (SHA or branch) to checkout before bumping"
        required: true
        type: string
    outputs:
      commit_sha:
        description: "HEAD after push (for chained publish / second bump)."
        value: ${{ jobs.change.outputs.commit_sha }}
  workflow_dispatch:
    inputs:
      from_version:
        description: "Exact version string currently in repo (e.g. 0.7.0-SNAPSHOT)"
        required: true
        type: string
      to_version:
        description: "New version string (e.g. 0.7.0 or 0.8.0-SNAPSHOT)"
        required: true
        type: string

jobs:
  change:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      commit_sha: ${{ steps.record_sha.outputs.sha }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout at caller ref
        if: github.event_name == 'workflow_call'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_ref }}

      - name: Checkout default
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Replace version strings
        env:
          FROM: ${{ inputs.from_version }}
          TO: ${{ inputs.to_version }}
        run: |
          set -euo pipefail
          if [[ -z "$FROM" || -z "$TO" || "$FROM" == "$TO" ]]; then
            echo "from_version and to_version must be non-empty and different."
            exit 1
          fi
          for f in skeptic/project.clj lein-skeptic/project.clj README.md; do
            if ! grep -qF "$FROM" "$f"; then
              echo "Expected to find '$FROM' in $f"
              exit 1
            fi
          done
          for f in skeptic/project.clj lein-skeptic/project.clj README.md; do
            sed -i.bak "s|${FROM}|${TO}|g" "$f"
            rm -f "${f}.bak"
          done

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.6
        with:
          lein: 2.11.2

      - name: Verify monorepo versions
        run: bash script/verify-monorepo-versions.sh

      - name: Install and regenerate POMs
        run: |
          set -euo pipefail
          cd skeptic && lein install && lein pom
          cd ../lein-skeptic && lein pom

      - name: Commit, tag, and push
        env:
          FROM: ${{ inputs.from_version }}
          TO: ${{ inputs.to_version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skeptic/project.clj lein-skeptic/project.clj README.md skeptic/pom.xml lein-skeptic/pom.xml
          git commit -m "Bump coordinated version ${FROM} -> ${TO}"
          tag="v${TO}"
          git tag "${tag}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "refs/tags/${tag}"

      - name: Record commit SHA
        id: record_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
